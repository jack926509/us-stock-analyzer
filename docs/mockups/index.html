<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>US Stock Analyzer — 網頁優化 + 手機版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Noto+Serif+TC:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #EFEAE0; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="web-dashboard.jsx"></script>
<script type="text/babel" src="web-stock-detail.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="web" title="網頁版優化" subtitle="1440 桌面 · Claude Design palette · 米色 + 珊瑚橘">
        <DCArtboard id="web-dash" label="A · Dashboard 主頁" width={1440} height={1700}>
          <WebDashboard />
        </DCArtboard>
        <DCArtboard id="web-detail" label="B · 個股詳情頁 + 13 代理人" width={1440} height={2200}>
          <WebStockDetail />
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="手機版" subtitle="iPhone 16 Pro · 402 × 874 · 沿用網頁設計系統">
        <DCArtboard id="m-dash" label="01 · 儀表板" width={402} height={874}>
          <MobileDashboard />
        </DCArtboard>
        <DCArtboard id="m-detail" label="02 · 個股詳情" width={402} height={874}>
          <MobileStockDetail />
        </DCArtboard>
        <DCArtboard id="m-deep" label="03 · 深度分析（13 代理人）" width={402} height={874}>
          <MobileDeepAnalysis />
        </DCArtboard>
        <DCArtboard id="m-port" label="04 · 持股管理" width={402} height={874}>
          <MobilePortfolio />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
